name: Build & Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

jobs:
  # ─── Windows : génération du .exe ──────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "pygame>=2.5.0" "numpy>=1.21.0" "psutil>=5.8.0" pyinstaller

      - name: Build Windows EXE
        run: >
          pyinstaller
          --onefile
          --windowed
          --name "ProjetMMO2D"
          --add-data "assets;assets"
          --add-data "data;data"
          --add-data "settings.json;."
          main.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/ProjetMMO2D.exe

  # ─── Linux : génération du Flatpak ─────────────────────────────────────────
  build-flatpak:
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:freedesktop-23.08
      options: --privileged
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: ProjetMMO2D.flatpak
          manifest-path: packaging/io.github.Estemobs.ProjetMMO2D.yml
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-flatpak
          path: ProjetMMO2D.flatpak

  # ─── Publication de la release GitHub ──────────────────────────────────────
  release:
    needs: [build-windows, build-flatpak]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows-exe/ProjetMMO2D.exe
            linux-flatpak/ProjetMMO2D.flatpak
          generate_release_notes: true
